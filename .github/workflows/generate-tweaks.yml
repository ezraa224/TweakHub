name: Generate Tweaks and Open PR

on:
  workflow_dispatch:
    inputs:
      tweaksCount:
        description: 'Number of tweaks to generate (total)'
        required: false
        default: '10000'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Build generator
        run: dotnet build Tools/GenerateTweaks/GenerateTweaks.csproj -c Release

      - name: Run generator
        run: |
          mkdir -p data
          dotnet run --project Tools/GenerateTweaks/GenerateTweaks.csproj -- data ${{ github.event.inputs.tweaksCount }}
          ls -la data
          echo "Preview (first 40 lines):"
          head -n 40 data/tweaks.json || true

      - name: Create Pull Request with generated files
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-generate tweaks.json"
          branch: "autogen/generate-tweaks-${{ github.run_id }}"
          title: "Auto-generated tweaks.json (run ${{ github.run_number }})"
          body: |
            This PR adds/updates data/tweaks.json generated by Tools/GenerateTweaks.
            The generated tweaks are SIMULATED by default — review carefully before enabling any tweak.
          base: main
          labels: autogenerated
